<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <meta http-equiv="X-UA-Compatible" content="ie=edge">\n    <title>Masuk - Secure</title>\n    <script>\n        // CSRF Protection Token\n        const csrfToken = 'YOUR_CSRF_TOKEN';\n        const validateInput = (input) => {\n            // Basic input sanitization function\n            return input.replace(/<[^>]*>/g, '').trim();\n        };\n        const safeJSONParse = (jsonString) => {\n            try {\n                return JSON.parse(jsonString);\n            } catch (e) {\n                console.error("Invalid JSON input", e);\n                return null;\n            }\n        };\n    <\/script>\n</head>\n<body>\n    <form action="/submit" method="POST" onsubmit="return handleSubmit(event);">\n        <input type="hidden" name="csrf_token" value="${csrfToken}">\n        <label for="username">Username:</label>\n        <input type="text" id="username" name="username" required>\n        <label for="password">Password:</label>\n        <input type="password" id="password" name="password" required>\n        <button type="submit">Login</button>\n    </form>\n    <script>\n        function handleSubmit(event) {\n            event.preventDefault();\n            const username = validateInput(document.getElementById('username').value);\n            const password = validateInput(document.getElementById('password').value);\n            const formData = { username, password };\n            console.log('Submitting form data:', formData);\n            // Here you would typically send formData to the server with fetch or XMLHttpRequest\n        }\n    <\/script>\n</body>\n</html>
